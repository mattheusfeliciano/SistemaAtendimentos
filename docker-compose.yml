services:
  postgres:
    image: postgres:16-alpine
    container_name: dash_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dash_educacao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dash_educacao"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: node:20-alpine
    container_name: dash_api
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    environment:
      API_PORT: 3001
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: dash_educacao
      PGUSER: postgres
      PGPASSWORD: Postgres@2026!
    command: sh -c "npm install && npm run api"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    image: node:20-alpine
    container_name: dash_web
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_DEV_PROXY_TARGET: http://api:3001
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:

